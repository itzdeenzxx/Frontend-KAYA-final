<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="KAYA workout badge">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="100" r="220" fill="#fb923c" opacity="0.16"/>
  <circle cx="180" cy="560" r="240" fill="#f59e0b" opacity="0.12"/>
  <rect x="90" y="96" width="340" height="438" rx="48" fill="#0a0f1d" stroke="#fb923c" stroke-opacity="0.4"/>
  <rect x="126" y="132" width="268" height="268" rx="42" fill="url(#glow)"/>
  <text x="260" y="300" text-anchor="middle" font-size="132" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji">🏋️</text>
  <text x="126" y="458" fill="#fde68a" font-size="40" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Workout Badge</text>
  <text x="126" y="502" fill="#cbd5e1" font-size="28" font-family="Segoe UI, Arial, sans-serif">KAYA Achievement</text>
  <text x="490" y="212" fill="#f8fafc" font-size="72" font-family="Segoe UI, Arial, sans-serif" font-weight="800">KAYA</text>
  <text x="490" y="286" fill="#fb923c" font-size="56" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Badge Unlocked</text>
  <text x="490" y="370" fill="#cbd5e1" font-size="34" font-family="Segoe UI, Arial, sans-serif">Train smart. Stay consistent. Keep rising.</text>
</svg>
