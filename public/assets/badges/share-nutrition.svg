<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="KAYA nutrition badge">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1720"/>
      <stop offset="60%" stop-color="#123a2f"/>
      <stop offset="100%" stop-color="#071b15"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="96" r="220" fill="#34d399" opacity="0.16"/>
  <circle cx="180" cy="552" r="250" fill="#10b981" opacity="0.13"/>
  <rect x="90" y="96" width="340" height="438" rx="48" fill="#081a16" stroke="#34d399" stroke-opacity="0.45"/>
