<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="KAYA game badge">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="60%" stop-color="#1d1140"/>
      <stop offset="100%" stop-color="#081325"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="960" cy="100" r="230" fill="#38bdf8" opacity="0.18"/>
  <circle cx="220" cy="560" r="260" fill="#2563eb" opacity="0.14"/>
  <rect x="90" y="96" width="340" height="438" rx="48" fill="#090f1c" stroke="#38bdf8" stroke-opacity="0.45"/>
