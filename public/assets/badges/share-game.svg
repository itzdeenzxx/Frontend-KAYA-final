  <text x="260" y="300" text-anchor="middle" font-size="132" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji">🎮</text>
  <text x="126" y="458" fill="#bae6fd" font-size="40" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Game Badge</text>
  <text x="126" y="502" fill="#bfdbfe" font-size="28" font-family="Segoe UI, Arial, sans-serif">KAYA Achievement</text>
  <text x="490" y="212" fill="#f8fafc" font-size="72" font-family="Segoe UI, Arial, sans-serif" font-weight="800">KAYA</text>
  <text x="490" y="286" fill="#22d3ee" font-size="56" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Badge Unlocked</text>
  <text x="490" y="370" fill="#cbd5e1" font-size="34" font-family="Segoe UI, Arial, sans-serif">Play sharp. React fast. Level up daily.</text>
